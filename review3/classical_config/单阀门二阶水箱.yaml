# 单阀门二阶水箱 PID 液位控制（经典表达式 DSL 语法）
# 与 config/单阀门二阶水箱.yaml 物理参数和控制参数完全等价，仅语法组织方式不同。
# 拓扑：水源 → 调节阀 → 上游水箱 → 下游水箱 → 排水
# PID 控制下游水箱 tank_2.level → SV=0.8m
# 开环辨识组态见 单阀门二阶水箱开环辨识.yaml
# 注意：program 顺序与结构化语法的拓扑排序结果一致（pid2 先于 valve_1/tank_1/tank_2 执行），
# 以保证两份 DSL 运行结果等价。
clock:
  mode: REALTIME
  cycle_time: 0.5

program:
  - name: source_flow
    type: VARIABLE
    expression: source_flow = 0.0012
    display_args: []

  - name: pid2
    type: PID
    init_args:
      PB: 30.0
      TI: 90.0
      TD: 20.0
      KD: 10.0

      MODE: 5
      SWPN: 1

      SVSCL: 0.0
      SVSCH: 1.2
      SVL: 0.0
      SVH: 1.2

      MVSCL: 0.0
      MVSCH: 100.0
      MVL: 0.0
      MVH: 100.0

      PV: 0.10
      SV: 0.8
      MV: 0.0
    display_args:
      - "MV[100]"
      - "PV[1.2]"
      - "SV[1.2]"
      - "MODE"
    expression: pid2.execute(PV=tank_2.level)

  - name: valve_1
    type: VALVE
    init_args:
      full_travel_time: 12.0
      initial_opening: 0.0
    display_args: []
    expression: valve_1.execute(target_opening=pid2.MV, inlet_flow=source_flow)

  - name: tank_1
    type: CYLINDRICAL_TANK
    init_args:
      height: 1.2
      radius: 0.15
      outlet_area: 0.00025
      initial_level: 0.15
    display_args:
      - "level[1.2]"
    expression: tank_1.execute(inlet_flow=valve_1.outlet_flow)

  - name: tank_2
    type: CYLINDRICAL_TANK
    init_args:
      height: 1.2
      radius: 0.15
      outlet_area: 0.0002
      initial_level: 0.10
    display_args:
      - "level[1.2]"
    expression: tank_2.execute(inlet_flow=tank_1.outlet_flow)
