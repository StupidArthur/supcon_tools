program:
  - name: source_flow
    type: Variable
    value: 0.01
    display_args: []

  - name: mv
    type: LIST_WAVE
    params:
      wave_list:
        - [0, 1000]
        - [50, 1000]
        - [100, 1000]
    display_args: []

  - name: valve_1
    type: VALVE
    params:
      full_travel_time: 10
    display_args: ["outlet_flow[0.2]", "current_opening[100]", "target_opening[100]"]
    inputs:
      target_opening: mv.out
      inlet_flow: source_flow

  - name: tank_1
    type: CYLINDRICAL_TANK
    params: {}
    display_args: ["level[2]"]
    inputs:
      inlet_flow: valve_1.outlet_flow

  - name: tank_2
    type: CYLINDRICAL_TANK
    params: {}
    display_args: ["level[2]"]
    inputs:
      inlet_flow: tank_1.outlet_flow

  - name: M_DV1
    type: RANDOM
    params:
      L: 0.0
      H: 100.0
      max_step: 3.0
    display_args: ["out[100]"]

  - name: M_MV3
    type: Expression
    formula: valve_1.current_opening
    display_args: ["M_MV3"]
