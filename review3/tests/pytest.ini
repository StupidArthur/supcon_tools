[pytest]
# pytest 配置文件

# Python 路径（确保可以导入项目模块）
pythonpath = .

# 测试发现模式（只跑 standalone 模式的单元测试，不跑 distributed 残留）
testpaths = tests

# 测试文件匹配模式
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 输出选项
addopts =
    -v
    --tb=short
    # 根目录的 test_tank_stabilization.py / test_opcua_client.py 是 OPC UA 客户端 demo 脚本，
    # 不是 pytest 测试。pytest 默认会从 rootdir 扫所有 test_*.py，这里显式排除避免收集时报错。
    --ignore=test_tank_stabilization.py
    --ignore=test_opcua_client.py

# 日志配置
log_cli = false
log_cli_level = INFO
